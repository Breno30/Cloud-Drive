<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CloudDrive – Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <script src="./config.js"></script>
  <script src="./script.js?version=855488"></script>
  <style>
    :root {
      --bg: #020617;
      --bg-elevated: #020617;
      --accent: #3b82f6;
      --accent-soft: rgba(59, 130, 246, 0.12);
      --border-subtle: rgba(148, 163, 184, 0.2);
      --border-heavy: rgba(30, 64, 175, 0.8);
      --muted: #9ca3af;
      --text: #f9fafb;
      --text-soft: #e5e7eb;
      --danger: #f97373;
      --radius-lg: 14px;
      --radius-md: 10px;
      --radius-pill: 999px;
      --shadow-soft: 0 14px 30px rgba(15, 23, 42, 0.7);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
        "Inter", sans-serif;
      font-size: 0.938rem;
      line-height: 1.5;
      background: #020617;
      color: var(--text);
      height: 100%;
    }

    body {
      display: flex;
      align-items: stretch;
      justify-content: center;
      padding: 16px;
    }

    .shell {
      gap: 16px;
      width: 100%;
      max-width: 1440px;
      height: 100%;
      max-height: 860px;
    }

    .panel {
      max-width: 1200px;
      padding: 1.5rem;
      background: var(--bg-elevated);
      border-radius: 16px;
      border: 1px solid var(--border-subtle);
      box-shadow: var(--shadow-soft);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .sidebar {
      display: grid;
      grid-template-columns: 1fr 260px;
      gap: 1rem;
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 2em;
    }

    .logo-mark {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      background: linear-gradient(135deg, #3b82f6, #0f766e);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-mark-inner {
      width: 11px;
      height: 11px;
      border-radius: 4px;
      background: #e5e7eb;
    }

    .logo-image {
      display: block;
      max-width: 100%;
      max-height: 5rem;
      height: auto;
      object-fit: contain;
    }

    .logo-sub {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
      word-break: break-word;
    }

    .user-pic {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      background: #1e293b;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-soft);
    }

    .user-meta {
      margin: 8px 6px 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .user-name {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .user-email {
      font-size: 0.75rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }


    .sidebar-logout {
      width: 100%;
      justify-content: center;
      margin-top: 10px;
    }

    .sidebar-actions {
      margin-bottom: 20px;
    }

    .btn-primary {
      width: 100%;
      border: 0;
      border-radius: var(--radius-pill);
      padding: 9px 14px;
      font-size: 0.875rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #f9fafb;
      background: var(--accent);
      cursor: pointer;
      transition: transform 0.12s ease-out, box-shadow 0.12s ease-out,
        filter 0.12s ease-out;
    }

    .btn-primary span.icon {
      width: 20px;
      height: 20px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      line-height: 1;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 20px 36px rgba(37, 99, 235, 0.9);
      filter: brightness(1.05);
    }

    .btn-primary:active {
      transform: translateY(1px) scale(0.99);
      box-shadow: 0 10px 20px rgba(15, 23, 42, 0.95);
    }

    .nav-section-label {
      font-size: 0.75rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--muted);
      margin: 14px 6px 4px;
    }

    .nav-list {
      list-style: none;
      margin: 0;
      padding: 4px;
      border-radius: 10px;
      background: #020617;
      border: 1px solid rgba(15, 23, 42, 0.9);
    }

    .nav-item {
      margin: 1px 0;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 0.875rem;
      color: var(--muted);
      text-decoration: none;
      position: relative;
      overflow: hidden;
    }

    .nav-link span.icon {
      width: 20px;
      height: 20px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.813rem;
      background: rgba(15, 23, 42, 0.9);
      color: var(--muted);
    }

    .nav-link span.label {
      flex: 1;
    }

    .nav-link span.badge {
      font-size: 0.75rem;
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.85);
      border: 1px solid rgba(148, 163, 184, 0.3);
    }

    .nav-link.active {
      color: var(--text);
      background: rgba(37, 99, 235, 0.22);
      border-radius: 8px;
    }

    .nav-link.active span.icon {
      color: #e5e7eb;
    }

    .nav-link:hover:not(.active) {
      background: rgba(15, 23, 42, 0.9);
    }

    .sidebar-footer {
      margin-top: auto;
      border-top: 1px solid rgba(15, 23, 42, 0.96);
    }

    .storage-card {
      background: rgba(15, 23, 42, 0.98);
      border-radius: 16px;
      padding: 12px 12px 10px;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(30, 64, 175, 0.7);
      box-shadow: 0 10px 26px rgba(15, 23, 42, 0.95);
    }

    .storage-header {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .storage-title {
      font-size: 0.813rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .storage-pill {
      font-size: 0.75rem;
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(191, 219, 254, 0.65);
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .storage-meters {
      position: relative;
      margin-bottom: 6px;
      display: flex;
      gap: 4px;
    }

    .meter-track {
      flex: 1;
      height: 7px;
      border-radius: 999px;
      background: #fff;
      overflow: hidden;
      border: 1px solid rgba(15, 23, 42, 0.96);
    }

    .meter-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg,
          #facc15,
          #fb923c,
          #f97316,
          #fb923c,
          #facc15);
      background-size: 200% 100%;
      animation: shimmer 4s linear infinite;
    }

    .storage-legend {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.75rem;
      color: #dbeafe;
    }

    .storage-legend span.sub {
      color: #c4dcff;
      opacity: 0.9;
    }

    .storage-legend span.label {
      font-weight: 500;
    }

    .storage-legend span.value {
      font-variant-numeric: tabular-nums;
    }

    .storage-warning {
      margin-top: 8px;
      padding: 8px 10px;
      border-radius: 10px;
      background: rgba(248, 113, 113, 0.16);
      border: 1px solid rgba(248, 113, 113, 0.6);
      color: #fecaca;
      font-size: 0.75rem;
      line-height: 1.4;
      display: none;
    }

    .storage-warning.is-visible {
      display: block;
    }

    .chip-row {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      position: relative;
    }

    .chip {
      border-radius: 999px;
      padding: 3px 10px 4px;
      font-size: 0.75rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(15, 23, 42, 0.85);
      border: 1px solid rgba(191, 219, 254, 0.4);
      box-shadow: var(--shadow-chip);
    }

    .chip-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #22c55e;
      box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.3);
    }

    .chip-dot.warn {
      background: #fb923c;
      box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.4);
    }

    .chip-dot.danger {
      background: #f97373;
      box-shadow: 0 0 0 3px rgba(248, 113, 113, 0.5);
    }

    .chip span.label {
      opacity: 0.95;
    }

    .chip span.data {
      font-variant-numeric: tabular-nums;
      color: #bfdbfe;
    }

    .chip span.hotkey {
      font-family: "SF Mono", ui-monospace, Menlo, Monaco, Consolas,
        "Liberation Mono", "Courier New", monospace;
      font-size: 0.625rem;
      opacity: 0.85;
    }

    .chip span.hotkey kbd {
      padding: 1px 5px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.5);
      background: rgba(15, 23, 42, 0.7);
    }

    .main {
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 0;
      flex: 1;
    }

    .main-header {
      padding: 12px 0px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: #020617;
    }

    .search-shell {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .search-input-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 11px;
      border-radius: 999px;
      background: #020617;
      border: 1px solid rgba(30, 64, 175, 0.55);
    }

    .search-input-wrapper span.icon {
      font-size: 0.875rem;
      color: var(--muted);
    }

    .search-input-wrapper input {
      flex: 1;
      border: none;
      background: transparent;
      color: var(--text);
      font-size: 0.875rem;
      outline: none;
    }

    .search-input-wrapper input::placeholder {
      color: var(--muted);
    }

    .search-hotkey {
      font-size: 0.75rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .search-hotkey kbd {
      font-family: "SF Mono", ui-monospace, Menlo, Monaco, Consolas,
        "Liberation Mono", "Courier New", monospace;
      font-size: 0.625rem;
      padding: 1px 6px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.5);
      background: rgba(15, 23, 42, 0.8);
    }

    .view-toggles {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .icon-button {
      border-radius: 999px;
      border: 1px solid rgba(30, 64, 175, 0.7);
      background: rgba(15, 23, 42, 0.95);
      color: var(--muted);
      width: 28px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.875rem;
      cursor: pointer;
      transition: background 0.12s ease-out, color 0.12s ease-out,
        border-color 0.12s ease-out, transform 0.1s ease-out;
    }

    .icon-button.active {
      color: #dbeafe;
      background: radial-gradient(circle at 0 0,
          rgba(59, 130, 246, 0.8),
          rgba(15, 23, 42, 0.98));
      border-color: rgba(191, 219, 254, 0.8);
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.95);
    }

    .icon-button:hover {
      transform: translateY(-1px);
    }

    .user-strip {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-left: 10px;
      border-left: 1px solid rgba(15, 23, 42, 0.85);
    }

    .user-name {
      font-size: 0.75rem;
      display: flex;
      flex-direction: column;
      line-height: 1.1;
    }

    .user-name span.sub {
      color: var(--muted);
      font-size: 0.688rem;
    }

    .main-toolbar {
      padding: 12px 0px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #020617;
    }

    .breadcrumbs {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.875rem;
      color: var(--muted);
    }

    .breadcrumbs span.current {
      color: var(--text);
      font-weight: 500;
    }

    .toolbar-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .pill-button {
      border-radius: 999px;
      border: 1px solid rgba(30, 64, 175, 0.9);
      background: rgba(15, 23, 42, 0.96);
      color: var(--muted);
      font-size: 0.813rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 9px;
      cursor: pointer;
    }

    .pill-button span.icon {
      font-size: 0.813rem;
    }

    .pill-button.primary {
      color: #dbeafe;
      background: radial-gradient(circle at 0 0,
          rgba(59, 130, 246, 0.9),
          rgba(37, 99, 235, 0.98));
      border-color: rgba(191, 219, 254, 0.9);
      box-shadow: 0 12px 24px rgba(15, 23, 42, 0.96);
    }

    .pill-button.ghost {
      color: #fecaca;
      border-color: rgba(239, 68, 68, 0.7);
      background: rgba(127, 29, 29, 0.2);
    }

    .main-body {
      position: relative;
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #020617;
      min-height: 0;
    }

    .main-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      grid-auto-rows: 1fr;
      flex: 1;
      min-height: 0;
    }

    .card {
      background: #020617;
      border-radius: 12px;
      border: 1px solid rgba(17, 24, 39, 1);
      box-shadow: none;
      padding: 10px 10px 10px;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .card-title-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-title {
      font-size: 0.875rem;
      font-weight: 500;
    }

    .card-subtitle {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .card-tabs {
      display: inline-flex;
      align-items: center;
      background: rgba(15, 23, 42, 0.96);
      border-radius: 999px;
      padding: 2px;
      border: 1px solid rgba(30, 64, 175, 0.8);
    }

    .card-tab {
      border-radius: 999px;
      padding: 3px 9px;
      font-size: 0.688rem;
      color: var(--muted);
      cursor: pointer;
    }

    .card-tab.active {
      background: radial-gradient(circle at 0 0,
          rgba(59, 130, 246, 0.85),
          rgba(37, 99, 235, 0.96));
      color: #dbeafe;
      box-shadow: 0 8px 16px rgba(15, 23, 42, 0.95);
    }

    .file-header-row {
      display: grid;
      grid-template-columns: minmax(0, 3fr) 1.1fr 1.1fr 0.6fr 0.6fr;
      gap: 6px;
      padding: 6px 6px;
      border-radius: 8px;
      font-size: 0.75rem;
      color: var(--muted);
      border: 1px solid rgba(15, 23, 42, 0.9);
      background: #020617;
    }

    .file-list {
      margin-top: 4px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid rgba(15, 23, 42, 0.98);
      background: #020617;
      min-height: 0;
      flex: 1;
      overflow-y: auto;
    }

    .file-list::-webkit-scrollbar {
      width: 10px;
    }

    .file-list::-webkit-scrollbar-track {
      background: rgba(2, 6, 23, 0.9);
      border-left: 1px solid rgba(15, 23, 42, 0.9);
    }

    .file-list::-webkit-scrollbar-thumb {
      background: rgba(59, 130, 246, 0.55);
      border-radius: 999px;
      border: 2px solid rgba(2, 6, 23, 0.9);
    }

    .file-list {
      scrollbar-color: rgba(59, 130, 246, 0.6) rgba(2, 6, 23, 0.9);
      scrollbar-width: thin;
    }

    .file-row {
      display: grid;
      grid-template-columns: minmax(0, 3fr) 1.1fr 1.1fr 0.6fr 0.6fr;
      gap: 6px;
      padding: 6px 6px;
      align-items: center;
      cursor: pointer;
      position: relative;
    }

    .file-row:hover {
      background: rgba(30, 64, 175, 0.18);
    }

    .file-row.selected {
      background: rgba(37, 99, 235, 0.32);
    }

    .file-name-cell {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .file-icon {
      width: 22px;
      height: 22px;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.813rem;
      background: #020617;
      border: 1px solid rgba(30, 64, 175, 0.8);
      color: #bfdbfe;
    }

    .file-meta {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .file-name {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-sub {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .file-cell {
      font-size: 0.813rem;
      color: var(--text-soft);
    }

    .file-label {
      display: none;
      font-size: 0.625rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-right: 6px;
    }

    .file-actions {
      justify-self: flex-end;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin: 0 auto;
    }

    .file-actions-header {
      margin: 0 auto;
    }

    .uploading-row {
      background: linear-gradient(120deg, rgba(30, 64, 175, 0.08), rgba(59, 130, 246, 0.2), rgba(30, 64, 175, 0.08));
      background-size: 200% 100%;
      animation: upload-shimmer 1.6s ease-in-out infinite;
      cursor: default;
    }

    .uploading-row .file-icon {
      border-color: rgba(56, 189, 248, 0.8);
      color: #bae6fd;
    }

    .uploading-row .file-sub {
      color: #93c5fd;
    }

    .upload-ellipsis::after {
      content: "...";
      display: inline-block;
      width: 0ch;
      overflow: hidden;
      vertical-align: bottom;
      animation: upload-ellipsis 1.2s steps(3, end) infinite;
    }

    #upload-button {
      position: relative;
    }

    #upload-button .upload-spinner {
      width: 14px;
      height: 14px;
      border-radius: 999px;
      border: 2px solid rgba(191, 219, 254, 0.35);
      border-top-color: #bfdbfe;
      display: inline-block;
      opacity: 0;
      transition: opacity 0.2s ease;
      animation: upload-spin 0.9s linear infinite;
    }

    #upload-button.is-uploading {
      pointer-events: none;
      opacity: 0.85;
      box-shadow: 0 0 0 1px rgba(59, 130, 246, 0.6);
    }

    #upload-button.is-uploading .upload-spinner {
      opacity: 1;
    }

    #upload-button.is-uploading .upload-label {
      opacity: 0.75;
    }

    @keyframes upload-spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    @keyframes upload-shimmer {
      0% {
        background-position: 0% 50%;
      }

      100% {
        background-position: 200% 50%;
      }
    }

    @keyframes upload-ellipsis {
      0% {
        width: 0ch;
      }

      100% {
        width: 3ch;
      }
    }

    .tiny-icon {
      width: 20px;
      height: 20px;
      border-radius: 999px;
      border: 1px solid rgba(30, 64, 175, 0.7);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.688rem;
      color: var(--muted);
      background: rgba(15, 23, 42, 0.96);
      cursor: pointer;
      padding: 0;
      line-height: 1;
      gap: 6px;
    }

    .tiny-icon .button-text {
      display: none;
      font-size: 0.75rem;
      letter-spacing: 0.02em;
    }

    .tiny-icon.primary {
      color: #dbeafe;
      background: radial-gradient(circle at 0 0,
          rgba(59, 130, 246, 0.9),
          rgba(37, 99, 235, 0.98));
      border-color: rgba(191, 219, 254, 0.8);
    }

    .tiny-icon.danger {
      color: #fee2e2;
      background: radial-gradient(circle at 0 0,
          rgba(248, 113, 113, 0.92),
          rgba(239, 68, 68, 0.98));
      border-color: rgba(254, 202, 202, 0.8);
    }

    .tiny-icon:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .empty-hint {
      margin-top: 12px;
      font-size: 0.75rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .empty-hint span.kbd {
      font-family: "SF Mono", ui-monospace, Menlo, Monaco, Consolas,
        "Liberation Mono", "Courier New", monospace;
      font-size: 0.625rem;
      padding: 1px 6px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.96);
      border: 1px solid rgba(148, 163, 184, 0.55);
    }

    .side-panel {
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 0;
    }

    .quick-access-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 6px;
    }

    .qa-item {
      border-radius: 14px;
      padding: 8px 8px 6px;
      background: #020617;
      border: 1px solid rgba(15, 23, 42, 0.96);
      cursor: default;
    }

    .qa-item[data-type="folder"] {
      border-color: rgba(56, 189, 248, 0.6);
    }

    .qa-item[data-type="recent"] {
      border-color: rgba(59, 130, 246, 0.7);
    }

    .qa-icon {
      width: 22px;
      height: 22px;
      border-radius: 9px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.813rem;
      margin-bottom: 4px;
    }

    .qa-icon.folder {
      background: radial-gradient(circle at 0 0,
          rgba(34, 211, 238, 0.9),
          rgba(8, 47, 73, 0.96));
      color: #e0f2fe;
    }

    .qa-icon.star {
      background: radial-gradient(circle at 0 0,
          rgba(250, 204, 21, 0.9),
          rgba(120, 53, 15, 0.96));
      color: #fef9c3;
    }

    .qa-icon.file {
      background: radial-gradient(circle at 0 0,
          rgba(59, 130, 246, 0.95),
          rgba(15, 23, 42, 0.98));
      color: #eff6ff;
    }

    .qa-label {
      font-size: 0.813rem;
    }

    .qa-sub {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .activity-list {
      margin-top: 6px;
      border-radius: 12px;
      border: 1px solid rgba(15, 23, 42, 0.96);
      background: #020617;
      padding: 6px 6px 4px;
      font-size: 0.75rem;
    }

    .activity-item {
      display: grid;
      grid-template-columns: minmax(0, 2.1fr) 0.9fr;
      gap: 6px;
      padding: 4px 4px;
      border-radius: 8px;
      align-items: center;
    }

    .activity-item:nth-child(2n) {
      background: rgba(15, 23, 42, 0.95);
    }

    .activity-main {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }

    .activity-badge {
      width: 18px;
      height: 18px;
      border-radius: 999px;
      border: 1px solid rgba(30, 64, 175, 0.9);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.688rem;
      background: rgba(15, 23, 42, 0.98);
      color: var(--muted);
    }

    .activity-text {
      min-width: 0;
    }

    .activity-text span.primary {
      font-size: 0.75rem;
    }

    .activity-text span.secondary {
      font-size: 0.688rem;
      color: var(--muted);
    }

    .activity-time {
      text-align: right;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      font-size: 0.688rem;
    }

    .outline-pill {
      border-radius: 999px;
      border: 1px dashed rgba(148, 163, 184, 0.5);
      padding: 4px 8px;
      font-size: 0.688rem;
      color: var(--muted);
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-top: 6px;
    }

    @keyframes shimmer {
      0% {
        background-position: 0 0;
      }

      100% {
        background-position: 200% 0;
      }
    }

    @media (max-width: 1024px) {
      body {
        padding: 10px;
      }

      .shell {
        grid-template-columns: minmax(0, 1fr);
        grid-template-rows: auto auto;
        max-height: none;
        height: auto;
      }

      .sidebar {
        min-height: 0;
      }
    }

    @media (max-width: 768px) {
      .main-header {
        flex-wrap: wrap;
        gap: 10px;
      }

      .user-strip {
        border: none;
        padding-left: 0;
        margin-left: auto;
      }

      .main-grid {
        grid-template-columns: minmax(0, 1fr);
        grid-auto-rows: auto;
      }
    }

    @media (max-width: 640px) {
      .logo {
        flex-direction: column;
        gap: 1rem;
      }

      .sidebar-header {
        place-self: center;
      }

      .file-actions button {
        min-width: 10em;
      }

      .logo-mark {
        display: none;
      }

      .sidebar {
        grid-template-columns: auto;
      }

      .shell {
        grid-template-columns: minmax(0, 1fr);
      }

      .file-header-row {
        display: none;
      }

      .file-row {
        grid-template-columns: minmax(0, 1fr);
        gap: 8px;
        padding: 10px 12px;
      }

      .file-cell,
      .file-actions {
        justify-self: flex-start;
        margin: 0;
      }

      .file-actions .file-label {
        display: none;
      }

      .file-label {
        display: inline-block;
      }

      .tiny-icon {
        width: auto;
        height: auto;
        padding: 6px 10px;
        font-size: 0.75rem;
      }

      .tiny-icon i {
        display: none;
      }

      .tiny-icon .button-text {
        display: inline;
      }
    }
  </style>
</head>

<body>
  <div class="panel shell">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
            <img class="logo-image" src="assets/cognito/logo.png" alt="CloudDrive" />
          <div>
            <div class="logo-sub" id="user-email">Personal cloud</div>
            <button class="pill-button ghost sidebar-logout" type="button" id="logout-button">
              <span class="icon"><i class="fa-solid fa-arrow-right-from-bracket"></i></span>
              <span>Logout</span>
            </button>
          </div>
        </div>
      </div>

      <div class="sidebar-footer">
        <div class="storage-card">
          <div class="storage-gradient-orbit"></div>
          <div class="storage-header">
            <div class="storage-title">Storage</div>
            <div class="storage-pill">
              <span>Plan</span>
              <span>Free</span>
            </div>
          </div>
          <div class="storage-meters">
            <div class="meter-track">
              <div class="meter-fill" id="storage-meter-fill" style="width: 0%"></div>
            </div>
          </div>
          <div class="storage-legend">
            <span class="label"><span class="sub">Used</span> ·
              <span class="value" id="storage-used">0 B</span> /
              <span class="value" id="storage-total">10 MB</span></span>
            <span class="sub" id="storage-percent">≈ 0%</span>
          </div>
          <div class="storage-warning" id="storage-warning" role="status" aria-live="polite"></div>
        </div>
      </div>
    </aside>

    <main class="main">
      <div class="main-header">
        <div class="search-shell">
          <div class="search-input-wrapper">
            <span class="icon"><i class="fa-solid fa-magnifying-glass"></i></span>
            <input type="search" id="search-input" placeholder="Search in CloudDrive"
              aria-label="Search in CloudDrive" />
          </div>
        </div>

      </div>

      <div class="main-toolbar">
        <div class="breadcrumbs">
          <span><i class="fa-solid fa-hard-drive"></i> My Drive</span>
          <span><i class="fa-solid fa-chevron-right"></i></span>
          <span class="current">All files</span>
        </div>
        <div class="toolbar-actions">
          <button class="pill-button" type="button" id="upload-button">
            <span class="icon"><i class="fa-solid fa-arrow-up-from-bracket"></i></span>
            <span class="upload-label">Upload</span>
            <span class="upload-spinner" aria-hidden="true"></span>
          </button>
          <input type="file" id="upload-input" style="display: none;" />
        </div>
      </div>

      <div class="main-body">
        <div class="main-grid">
          <section class="card">

            <div class="file-header-row">
              <div>Name</div>
              <div>Last modified</div>
              <div>Size</div>
              <div class="file-actions-header">Download</div>
              <div class="file-actions-header">Delete</div>
            </div>

            <div class="file-list" id="file-list"></div>

          </section>
        </div>

      </div>
    </main>
  </div>
</body>

</html>
