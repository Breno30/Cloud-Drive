name: Terraform Deploy

on:
  push:
    branches:
      - main

jobs:
  terraform:
    runs-on: ubuntu-latest
    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "0"

    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        run: |
          echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> $GITHUB_ENV
          echo "AWS_REGION=${{ secrets.AWS_REGION }}" >> $GITHUB_ENV

      - name: Terraform Init
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ secrets.TF_STATE_KEY }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan

      - name: Terraform Apply
        run: |
          terraform apply \
            -var="cognito_login_url=${{ vars.COGNITO_LOGIN_URL }}" \
            -var="cognito_custom_domain_name=${{ vars.COGNITO_CUSTOM_DOMAIN_NAME }}" \
            -var="cognito_acm_certificate_arn=${{ secrets.COGNITO_ACM_CERTIFICATE_ARN }}" \
            -var="frontend_origin_override=${{ vars.COGNITO_FRONTEND_ORIGIN_OVERRIDE }}" \
            -var="frontend_redirect_uri_override=${{ vars.COGNITO_FRONTEND_REDIRECT_URI_OVERRIDE }}" \
            -var="frontend_custom_domain_name=${{ vars.FRONTEND_CUSTOM_DOMAIN_NAME }}" \
            -var="acm_certificate_arn=${{ secrets.CLOUDFRONT_ACM_CERTIFICATE_ARN }}" \
            -auto-approve
